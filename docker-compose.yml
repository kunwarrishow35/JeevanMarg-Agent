version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=JeevanMarg
      - DATABASE_URL=sqlite+aiosqlite:///./jeevanmarg.db
      - JWT_SECRET=${JWT_SECRET:-jeevanmarg-secret-change-me}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-demo-key}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - backend_data:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
